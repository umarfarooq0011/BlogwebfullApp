name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Lint & build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm install` (not `npm ci`) works around an npm bug where lockfiles
        # generated on one platform omit other platforms' optional native
        # binaries (e.g. @rollup/rollup-linux-x64-gnu). See npm/cli#4828.
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
