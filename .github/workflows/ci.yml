name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Lint & build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # The lockfile is generated on Windows and omits Linux-only optional
        # native binaries (e.g. @rollup/rollup-linux-x64-gnu). Even `npm install`
        # respects the existing lockfile entries, so we remove it and let npm
        # resolve fresh on the Linux runner. See npm/cli#4828.
        working-directory: frontend
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
